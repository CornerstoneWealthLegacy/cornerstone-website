[build]
  publish = "."
  functions = "netlify/functions"

# Nightly health check — runs at 6 AM Eastern (11 AM UTC in EST / 10 AM UTC in EDT)
# Checks all key URLs + code integrity of /start. Sends ntfy alert only on failure.
[functions."health-check"]
  schedule = "0 11 * * *"

# Stripe webhook — receives raw body for signature verification
[functions."stripe-webhook"]
  included_files = []

# Secrets scanning — suppress false positives for intentionally public client-side keys.
# Stripe publishable keys (pk_test_/pk_live_) and Firebase web apiKeys are designed to be
# embedded in browser code and carry no privileged access. Real secrets (NOTIFY_SECRET,
# TWILIO_*, etc.) live only in Netlify environment variables, never in source files.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"

# Force HTTPS — redirect all HTTP to HTTPS
[[redirects]]
  from = "http://cornerstonewealthlegacy.com/*"
  to = "https://cornerstonewealthlegacy.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.cornerstonewealthlegacy.com/*"
  to = "https://cornerstonewealthlegacy.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://*.netlify.app/*"
  to = "https://:host/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self)"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.gstatic.com https://apis.google.com https://www.google.com https://www.recaptcha.net https://assets.calendly.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.calendly.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://api.stripe.com https://firestore.googleapis.com https://cornerstone-wealth-and-legacy.firebaseapp.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://api.twilio.com https://calendly.com; frame-src https://js.stripe.com https://hooks.stripe.com https://cornerstone-wealth-and-legacy.firebaseapp.com https://www.google.com https://www.recaptcha.net https://calendly.com; object-src 'none'; base-uri 'self'"

[[headers]]
  for = "/start.html"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Cache-Control = "no-cache, no-store, must-revalidate"

